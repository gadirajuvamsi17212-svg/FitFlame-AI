<html lang="en" class="light">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitFlame - Igniting Health through Science & Habit</title>
    <!-- Google Fonts: Figtree, Manrope, Source Serif 4 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet" />
    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Ensure window.fetch is writable to prevent "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // thrown by some polyfills/libraries running inside sandboxed environments.
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            writable: true,
            value: originalFetch
          });
        }
      } catch (e) {
        console.warn('Failed to make window.fetch writable, trying a fallback assignment proxy', e);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
